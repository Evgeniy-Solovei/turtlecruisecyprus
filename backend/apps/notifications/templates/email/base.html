<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>{% block title %}Turtle Cruise Cyprus{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;font-family:Arial,sans-serif;">
  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f5f5f5;padding:40px 0">
    <tr><td align="center">
      <div style="text-align:center;padding:0 0 20px">
        <img src="https://turtlecruisecyprus.com/wp-content/uploads/2026/03/scubacat-logo.png" alt="Turtle Cruise by SCUBACAT" style="max-height:56px;width:auto;border:none;">
      </div>
      <table border="0" cellpadding="0" cellspacing="0" width="600" style="background-color:#fdfdfd;border:1px solid #dcdcdc;border-radius:3px;">
        {% block header %}{% endblock %}
        <tr>
          <td style="padding:40px 48px;background-color:#fdfdfd;">
            {% block content %}{% endblock %}
          </td>
        </tr>
        {% block footer %}
        <tr>
          <td style="background-color:#096d8e;padding:16px 32px;text-align:center;border-radius:0 0 3px 3px;">
            <p style="margin:0;font-size:12px;color:#c8e8f0;">
              <a href="{{ site_base_url }}" style="color:#ffffff;text-decoration:none;">{{ site_base_url }}</a>
              &nbsp;·&nbsp; Ayia Napa Harbour (Limanaki), Cyprus
            </p>
          </td>
        </tr>
        {% endblock %}
      </table>
      <p style="color:#99b1c7;font-size:12px;text-align:center;margin:20px 0;">
        Turtle Cruise Cyprus — Ayia Napa Harbour | turtlecruisecyprus.com
      </p>
    </td></tr>
  </table>
</body>
</html>
