# Локально на Mac: только Postgres + Redis.
#   docker compose -f docker-compose.dev.yml up -d
#   ./scripts/migrate-to-postgres.sh
# Django: python manage.py runserver

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: turtlecruise
      POSTGRES_USER: turtlecruise
      POSTGRES_PASSWORD: turtlecruise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turtlecruise -d turtlecruise"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
