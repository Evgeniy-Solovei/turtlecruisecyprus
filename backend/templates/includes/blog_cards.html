{% load static %}
{% for post in posts %}
<div class="col">
  <a href="{{ site.prefix }}/{{ post.slug }}/" class="blog-item">
    {% if post.image_url %}
      <div class="image object-fit">
        <img src="{{ post.image_url }}" alt="{{ post.title }}">
      </div>
    {% endif %}
    <h3>{{ post.title }}</h3>
    <p>{{ post.excerpt }}</p>
  </a>
</div>
{% endfor %}
